<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로그인</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-box {
      background: white;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 10px;
      width: 300px;
    }
    input, button {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>로그인</h2>
    <input id="studentId" placeholder="학번 입력">
    <input id="password" type="password" placeholder="비밀번호 입력">
    <button onclick="login()">로그인</button>
    <p id="loginResult" style="color:red; margin-top:10px;"></p>
  </div>
  
  <script src="login.js"></script> <!--로그인 js파일 불러와서 연결-->
</body>
</html>
